name: Build Eaglercraft Client

on:
  push:
    branches: [ "main", "master" ] # Runs every time you save code
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Upload Compiled Client
        uses: actions/upload-artifact@v4
        with:
          name: Eaglercraft-Offline-Client
          path: target/*.html # This grabs the generated HTML file
