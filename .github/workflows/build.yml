name: Build Eaglercraft Performance Client

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build JavaScript Client
        # This command is the standard for EaglercraftX workspace
        run: ./gradlew makeMainOfflineDownload 

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Eaglercraft-Client
          # Eaglercraft Gradle usually puts the file in the 'javascript' folder
          path: javascript/*.html
